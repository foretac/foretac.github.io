<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="Inter, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="1200" height="500" fill="#FAFAFA"/>

  <!-- ===== Observation Block ===== -->
  <rect x="30" y="180" width="140" height="140" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="100" y="215" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">Observation</text>
  <text x="100" y="240" text-anchor="middle" font-size="11" fill="#4B5563">RGB Images</text>
  <text x="100" y="258" text-anchor="middle" font-size="11" fill="#4B5563">Proprioception</text>
  <text x="100" y="276" text-anchor="middle" font-size="11" fill="#4B5563">Marker Offset</text>
  <text x="100" y="300" text-anchor="middle" font-size="10" fill="#6B7280">(9×9×2)</text>

  <!-- Arrow: Obs → TacVAE -->
  <line x1="170" y1="250" x2="210" y2="250" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== TacVAE Encoder ===== -->
  <rect x="215" y="210" width="120" height="80" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="275" y="245" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">TacVAE</text>
  <text x="275" y="263" text-anchor="middle" font-size="10" fill="#6B7280">Encoder</text>
  <text x="275" y="280" text-anchor="middle" font-size="9" fill="#9CA3AF">❄ frozen</text>

  <!-- Arrow: TacVAE → DP -->
  <line x1="335" y1="250" x2="375" y2="250" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Diffusion Policy ===== -->
  <rect x="380" y="180" width="160" height="140" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="460" y="215" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">Diffusion Policy</text>
  <text x="460" y="240" text-anchor="middle" font-size="11" fill="#4B5563">ResNet18 Vision</text>
  <text x="460" y="258" text-anchor="middle" font-size="11" fill="#4B5563">+ Tactile Latent</text>
  <text x="460" y="276" text-anchor="middle" font-size="11" fill="#4B5563">+ Proprioception</text>
  <text x="460" y="298" text-anchor="middle" font-size="10" fill="#6B7280">→ DDPM Denoising</text>
  <text x="460" y="312" text-anchor="middle" font-size="10" fill="#6B7280">→ Clean Action Chunk</text>

  <!-- Arrow: DP → Foresight -->
  <path d="M 540 250 L 590 250" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="565" y="240" text-anchor="middle" font-size="9" fill="#6B7280">action</text>

  <!-- ===== Foresight Transformer ===== -->
  <rect x="595" y="180" width="180" height="140" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="685" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#D97706">Foresight</text>
  <text x="685" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="#D97706">Transformer</text>
  <text x="685" y="255" text-anchor="middle" font-size="11" fill="#4B5563">Obs + Action Chunk</text>
  <text x="685" y="273" text-anchor="middle" font-size="11" fill="#4B5563">→ Future Tactile</text>
  <text x="685" y="291" text-anchor="middle" font-size="11" fill="#4B5563">Latent (H steps)</text>
  <text x="685" y="312" text-anchor="middle" font-size="9" fill="#9CA3AF">❄ frozen weights, ∇ via action</text>

  <!-- Arrow: Foresight → Energy -->
  <path d="M 775 250 L 820 250" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="797" y="240" text-anchor="middle" font-size="9" fill="#6B7280">latent</text>

  <!-- ===== Contact Quality Energy ===== -->
  <rect x="825" y="180" width="170" height="140" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <text x="910" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626">Contact Quality</text>
  <text x="910" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626">Energy Model</text>
  <text x="910" y="258" text-anchor="middle" font-size="11" fill="#4B5563">Predicted Tactile</text>
  <text x="910" y="276" text-anchor="middle" font-size="11" fill="#4B5563">+ Action → Score</text>
  <text x="910" y="298" text-anchor="middle" font-size="10" fill="#6B7280">∂score/∂action</text>
  <text x="910" y="312" text-anchor="middle" font-size="9" fill="#9CA3AF">❄ frozen weights, ∇ via action</text>

  <!-- ===== Trust-Region Refiner ===== -->
  <rect x="1020" y="195" width="150" height="110" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="1095" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">Trust-Region</text>
  <text x="1095" y="243" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">Refiner</text>
  <text x="1095" y="270" text-anchor="middle" font-size="11" fill="#4B5563">Bounded gradient</text>
  <text x="1095" y="288" text-anchor="middle" font-size="11" fill="#4B5563">ascent (4 steps)</text>

  <!-- Arrow: Energy → Refiner -->
  <path d="M 995 250 L 1015 250" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1005" y="240" text-anchor="middle" font-size="9" fill="#6B7280">∇</text>

  <!-- ===== Feedback loop arrow (Refiner → Foresight) ===== -->
  <path d="M 1095 310 L 1095 370 L 685 370 L 685 325" stroke="#10B981" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-green)"/>
  <text x="890" y="388" text-anchor="middle" font-size="10" fill="#059669">refined action → re-predict → re-score (×4)</text>

  <!-- ===== Output: Guided Action ===== -->
  <path d="M 1095 195 L 1095 100 L 600 100" stroke="#1D4ED8" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="440" y="75" width="160" height="50" rx="8" fill="#1D4ED8"/>
  <text x="520" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="white">Guided Action</text>

  <!-- ===== Title ===== -->
  <text x="600" y="40" text-anchor="middle" font-size="18" font-weight="800" fill="#111827">ForeTac: Inference-Time Predictive Tactile Guidance</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#10B981"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#1D4ED8"/>
    </marker>
  </defs>
</svg>
